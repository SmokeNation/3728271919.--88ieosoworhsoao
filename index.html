<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PK Streamz Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root{
    --bg:#0a0b0f;
    --panel:#15171e;
    --panel-2:#1b1e26;
    --border:rgba(255,255,255,0.07);
    --accent:#2EE6A6;
    --accent-dim:rgba(46,230,166,0.14);
    --text:#F2F3F5;
    --text-dim:#8B93A1;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:transparent;
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* Header */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.5px;
  }
  .brand .pk{color:var(--accent);}
  .brand .streamz{color:var(--text-dim); font-weight:600; font-size:11px; letter-spacing:2px;}
  .live-pill{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--accent-dim);
    border:1px solid rgba(46,230,166,0.3);
    color:var(--accent);
    font-size:11px;
    font-weight:600;
    letter-spacing:1px;
    padding:5px 10px;
    border-radius:999px;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 0 rgba(46,230,166,0.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(46,230,166,0.5);}
    70%{box-shadow:0 0 0 6px rgba(46,230,166,0);}
    100%{box-shadow:0 0 0 0 rgba(46,230,166,0);}
  }

  /* Messages */
  #messages{
    flex:1;
    min-height:0;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  #messages::-webkit-scrollbar{width:4px;}
  #messages::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}

  .msg{
    background:rgba(255,255,255,0.09);
    backdrop-filter:blur(8px);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:8px 12px;
    max-width:85%;
    align-self:flex-start;
    animation:fadeIn 0.2s ease;
  }
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
  .msg .meta{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
    margin-bottom:2px;
  }
  .msg .user{
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:12.5px;
    color:var(--accent);
  }
  .msg .time{
    font-size:10px;
    color:var(--text-dim);
    white-space:nowrap;
  }
  .msg .text{
    font-size:13.5px;
    line-height:1.4;
    color:var(--text);
    word-break:break-word;
  }
  .system{
    align-self:center;
    color:var(--text-dim);
    font-size:11.5px;
    font-style:italic;
    padding:2px 0;
  }

  /* Input */
  #composer{
    display:flex;
    gap:8px;
    padding:12px;
    border-top:1px solid var(--border);
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    flex-shrink:0;
  }
  #msgInput{
    flex:1;
    background:rgba(255,255,255,0.09);
    border:1px solid var(--border);
    border-radius:999px;
    padding:10px 16px;
    color:var(--text);
    font-size:13.5px;
    font-family:'Inter',sans-serif;
    outline:none;
  }
  #msgInput:focus{border-color:var(--accent);}
  #msgInput::placeholder{color:var(--text-dim);}
  #sendBtn{
    background:var(--accent);
    color:#06241a;
    border:none;
    border-radius:999px;
    padding:0 18px;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    transition:opacity 0.15s;
  }
  #sendBtn:hover{opacity:0.85;}
  #sendBtn:disabled{opacity:0.4; cursor:default;}

  /* Join overlay */
  #joinOverlay{
    position:fixed;
    inset:0;
    background:rgba(8,9,12,0.7);
    backdrop-filter:blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  #joinCard{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(14px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:24px;
    width:85%;
    max-width:320px;
    text-align:center;
  }
  #joinCard h2{
    font-family:'Poppins',sans-serif;
    font-size:16px;
    margin:0 0 4px;
  }
  #joinCard h2 .pk{color:var(--accent);}
  #joinCard p{
    color:var(--text-dim);
    font-size:12px;
    margin:0 0 16px;
  }
  #nameInput{
    width:100%;
    background:rgba(255,255,255,0.09);
    border:1px solid var(--border);
    border-radius:999px;
    padding:10px 16px;
    color:var(--text);
    font-size:13.5px;
    font-family:'Inter',sans-serif;
    outline:none;
    margin-bottom:12px;
    text-align:center;
  }
  #nameInput:focus{border-color:var(--accent);}
  #joinBtn{
    width:100%;
    background:var(--accent);
    color:#06241a;
    border:none;
    border-radius:999px;
    padding:11px;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }
  .hidden{display:none !important;}
</style>
</head>
<body>

  <div id="joinOverlay">
    <div id="joinCard">
      <h2><span class="pk">PK</span> STREAMZ CHAT</h2>
      <p>Pick a name to join the live chat</p>
      <input id="nameInput" type="text" placeholder="Your name" maxlength="20" />
      <button id="joinBtn">Join Chat</button>
    </div>
  </div>

  <header>
    <div class="brand">
      <span class="pk">PK</span><span class="streamz">STREAMZ</span>
    </div>
    <div class="live-pill">
      <span class="live-dot"></span>
      <span id="onlineCount">LIVE CHAT</span>
    </div>
  </header>

  <div id="messages"></div>

  <div id="composer">
    <input id="msgInput" type="text" placeholder="Say something..." maxlength="500" />
    <button id="sendBtn">Send</button>
  </div>

<script>
  // Set this to your deployed chat server URL (e.g. Railway)
  const SOCKET_SERVER_URL = "https://livechat-production-e23b.up.railway.app";

  const socket = io(SOCKET_SERVER_URL);

  const joinOverlay = document.getElementById('joinOverlay');
  const nameInput = document.getElementById('nameInput');
  const joinBtn = document.getElementById('joinBtn');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const onlineCount = document.getElementById('onlineCount');

  let username = '';

  function formatTime(ts){
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(msg){
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `
      <div class="meta">
        <span class="user">${msg.user}</span>
        <span class="time">${formatTime(msg.time)}</span>
      </div>
      <div class="text"></div>
    `;
    div.querySelector('.text').textContent = msg.text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addSystem(text){
    const div = document.createElement('div');
    div.className = 'system';
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  joinBtn.addEventListener('click', () => {
    const val = nameInput.value.trim();
    username = val || 'Guest';
    socket.emit('join', username);
    joinOverlay.classList.add('hidden');
    msgInput.focus();
  });

  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') joinBtn.click();
  });

  function sendMessage(){
    const text = msgInput.value.trim();
    if (!text) return;
    socket.emit('message', text);
    msgInput.value = '';
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  socket.on('history', (history) => {
    messagesEl.innerHTML = '';
    history.forEach(addMessage);
  });

  socket.on('message', addMessage);
  socket.on('system', addSystem);

  socket.on('clear', () => {
    messagesEl.innerHTML = '';
  });

  socket.on('kicked', () => {
    msgInput.disabled = true;
    sendBtn.disabled = true;
    msgInput.placeholder = 'You were removed from the chat';
  });

  socket.on('userCount', (count) => {
    onlineCount.textContent = `${count} ONLINE`;
  });
</script>
</body>
</html>
